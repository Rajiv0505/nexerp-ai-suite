    :root{

    }
    [data-theme="light"]{

    .mark{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--green),var(--cyan));display:grid;place-items:center;color:white;font-weight:900}

ection class="top"><div><div class="brand">${S.company.name}</div><p class="muted">${S.company.address}</p><p class="muted">${S.company.email} · ${S.company.phone}</p></div><div class="right"><h1>INVOICE</h1><p><b>${inv.id}</b></p><p class="muted">Invoice Date: ${date(inv.date)}</p><p class="muted">Due Date: ${date(inv.due)}</p><span class="badge">${inv.status}</span></div></section><section class="grid"><div class="box"><h2>Bill To</h2><p><b>${inv.client}</b></p><p class="muted">Client billing address</p><p class="muted">India</p></div><div class="box"><h2>Payment Details</h2><p>Currency: ${S.company.currency}</p><p>Status: ${inv.status}</p><p>Terms: Net 30</p></div></section><table><thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead><tbody><tr><td>Enterprise ERP software services</td><td>1</td><td>${currency(subtotal)}</td><td>${currency(subtotal)}</td></tr><tr><td>GST / Tax 18%</td><td>1</td><td>${currency(tax)}</td><td>${currency(tax)}</td></tr></tbody></table><section class="totals"><div><span>Subtotal</span><b>${currency(subtotal)}</b></div><div><span>Tax</span><b>${currency(tax)}</b></div><div class="grand"><span>Total</span><span>${currency(inv.amount)}</span></div></section><section class="foot"><p><b>Thank you for your business.</b></p><p>This invoice was generated from NexERP. For PDF, choose "Save as PDF" in the print dialog.</p></section></main></body></html>`}
    function printInvoice(id){const inv=S.invoices.find(i=>i.id===id);if(!inv){toast("Invoice not found");return}const w=window.open("","_blank","width=900,height=900");if(!w){toast("Popup blocked. Please allow popups.");return}w.document.open();w.document.write(invoiceDocument(inv));w.document.close();w.focus();setTimeout(()=>w.print(),350);logAction("Printed invoice "+id,"Finance")}
    function previewInvoice(id){const inv=S.invoices.find(i=>i.id===id);if(!inv){toast("Invoice not found");return}openModal("Invoice Preview",`<div class="notice card pad"><b>${inv.id}</b><p>${inv.client} · ${currency(inv.amount)} · ${inv.status}</p><p class="muted mini">Use Print or PDF to generate a clean A4 invoice.</p></div><div class="formfoot"><button class="btn" onclick="printInvoice('${id}')">Print</button><button class="btn primary" onclick="printInvoice('${id}')">PDF</button></div>`)}
    function invoiceTable(list){return table(["Invoice","Client","Amount","Date","Due","Status","Action"],list.map(i=>`<tr><td><b>${i.id}</b></td><td>${i.client}</td><td>${currency(i.amount)}</td><td>${date(i.date)}</td><td>${date(i.due)}</td><td>${status(i.status)}</td><td><button class="btn" onclick="previewInvoice('${i.id}')">View</button> <button class="btn" onclick="printInvoice('${i.id}')">Print</button> <button class="btn primary" onclick="printInvoice('${i.id}')">PDF</button> <button class="btn danger" onclick="deleteRecord('invoices','id','${i.id}')">Delete</button></td></tr>`).join(""))}
    function pageMasterCustomers(){return layout("Customer Master","Number-wise customer master records",`<button class="btn" onclick="exportCSV('customer-master.csv',S.customers)">Export</button><button class="btn primary" onclick="openModal('Create Customer Master',form('customer'))">New Customer</button>`,table(["Customer No.","Name","Group","Contact","Email","Phone","Orders","Value","Action"],S.customers.map(c=>`<tr><td><b>${c.id||"-"}</b></td><td>${c.company}</td><td>${c.group||"-"}</td><td>${c.contact}</td><td>${c.email}</td><td>${c.phone}</td><td>${c.orders||0}</td><td>${currency(c.value||0)}</td><td><button class="btn danger" onclick="deleteRecord('customers','id','${c.id}')">Delete</button></td></tr>`).join("")))}

    function pageGL(){return layout("G/L Accounts","Number-wise general ledger accounts",`<button class="btn" onclick="exportCSV('gl-accounts.csv',S.glAccounts||[])">Export</button><button class="btn primary" onclick="openModal('Create G/L Account',form('gl'))">New G/L</button>`,table(["G/L No.","Name","Account Group","Type","Posting Type","Action"],(S.glAccounts||[]).map(g=>`<tr><td><b>${g.id}</b></td><td>${g.name}</td><td>${g.coa}</td><td>${g.type}</td><td>${g.posting}</td><td><button class="btn danger" onclick="deleteRecord('glAccounts','id','${g.id}')">Delete</button></td></tr>`).join("")))}
    function pageNumberRanges(){const ranges=S.numberRanges||{};return layout("Number Ranges","Automatic number generation control",`<button class="btn primary" onclick="toast('Number ranges saved')">Save Ranges</button>`,`<div class="card pad"><div class="formgrid">${Object.entries(ranges).map(([k,v])=>`<div class="field"><label>${k}</label><input type="number" value="${v}" oninput="S.numberRanges['${k}']=Number(this.value);save()"></div>`).join("")}</div></div><div class="card pad notice" style="margin-top:12px"><h3>Generated Examples</h3><p>Customer: CUST-${ranges.customer+1} · Vendor: VEN-${ranges.vendor+1} · Material: MAT-${ranges.material+1} · G/L: GL-${ranges.gl+1}</p></div>`)}
    function pageFinanceOverview(){const rev=sum(S.invoices,"amount"),exp=sum(S.expenses,"amount");return layout("Finance Overview","Accounts receivable, expenses, and profitability",`<button class="btn" onclick="exportCSV('invoices.csv',S.invoices)">Export</button><button class="btn primary" onclick="openModal('New Invoice',form('invoice'))">New Invoice</button>`,`<div class="grid stats">${stat("Total Invoiced",currency(rev),S.invoices.length+" invoices","₹")}${stat("Received",currency(sum(S.invoices.filter(i=>i.status==='paid'),"amount")),"paid","✓")}${stat("Outstanding",currency(sum(S.invoices.filter(i=>i.status!=='paid'),"amount")),"open","⌛")}${stat("Net Profit",currency(rev-exp),currency(exp)+" expense","↗")}</div><div class="grid two" style="margin-top:12px"><div class="card pad"><h3>Revenue vs Expenses</h3><canvas class="chart" data-chart='{"type":"bar","labels":["Revenue","Expenses","Profit"],"data":[${rev},${exp},${rev-exp}],"colors":["#12b886","#f4a62a","#35b7d4"]}'></canvas></div><div class="card pad"><h3>P&L Summary</h3><p>Gross revenue: <b>${currency(rev)}</b></p><p>Total expenses: <b>${currency(exp)}</b></p><p>Net profit: <b class="money">${currency(rev-exp)}</b></p></div></div>`) }

    function pageNotes(){const credit=sum((S.notes||[]).filter(n=>n.type==="Credit Note"),"amount"),debit=sum((S.notes||[]).filter(n=>n.type==="Debit Note"),"amount");return layout("Debit / Credit Notes","Manage customer credits and vendor debit adjustments",`<button class="btn" onclick="exportCSV('debit-credit-notes.csv',S.notes||[])">Export CSV</button><button class="btn primary" onclick="openModal('Create Debit / Credit Note',form('note'))">New Note</button>`,`<div class="grid stats">${stat("Credit Notes",currency(credit),(S.notes||[]).filter(n=>n.type==="Credit Note").length+" notes","CN")}${stat("Debit Notes",currency(debit),(S.notes||[]).filter(n=>n.type==="Debit Note").length+" notes","DN")}${stat("Net Adjustment",currency(debit-credit),"debit - credit","↕")}${stat("Pending Notes",(S.notes||[]).filter(n=>n.status==="pending").length,"approval","⌛")}</div><div style="margin-top:12px">${table(["Note","Type","Party","Against","Reason","Amount","Date","Status","Action"],(S.notes||[]).map(n=>`<tr><td><b>${n.id}</b></td><td>${n.type}</td><td>${n.party}</td><td>${n.against}</td><td>${n.reason}</td><td>${currency(n.amount)}</td><td>${date(n.date)}</td><td>${status(n.status)}</td><td><button class="btn danger" onclick="deleteRecord('notes','id','${n.id}')">Delete</button></td></tr>`).join(""))}</div>`)}
    function customerLedgerRows(){return S.customers.map(c=>{const inv=sum(S.invoices.filter(i=>i.client===c.company),"amount"),paid=sum(S.invoices.filter(i=>i.client===c.company&&i.status==="paid"),"amount"),credit=sum((S.notes||[]).filter(n=>n.type==="Credit Note"&&n.party===c.company),"amount"),balance=inv-paid-credit;return {...c,invoiced:inv,paid,credit,balance}})}
    function vendorLedgerRows(){return S.vendors.map(v=>{const po=sum(S.purchase.filter(p=>p.vendor===v.name),"amount"),received=sum(S.purchase.filter(p=>p.vendor===v.name&&/received|approved|in transit/.test(p.status)),"amount"),debit=sum((S.notes||[]).filter(n=>n.type==="Debit Note"&&n.party===v.name),"amount"),balance=po-debit;return {...v,purchase:po,processed:received,debit,balance}})}
    function companyVendorLedgerTransactions(){const rows=[];S.purchase.forEach(p=>rows.push({date:p.date,party:p.vendor,reference:p.id,description:p.items,debit:0,credit:Number(p.amount),amount:Number(p.amount),source:"Purchase Order"}));(S.notes||[]).filter(n=>n.type==="Debit Note").forEach(n=>rows.push({date:n.date,party:n.party,reference:n.id,description:n.reason,debit:Number(n.amount),credit:0,amount:-Number(n.amount),source:"Debit Note"}));return rows}
    function pageLedgers(){const customers=customerLedgerRows(),vendors=vendorLedgerRows();return layout("Customer & Vendor Ledgers","Party-wise receivables, payables, credits, and debit notes",`<button class="btn" onclick="exportCSV('customer-ledger.csv',customerLedgerRows())">Export Customers</button><button class="btn" onclick="exportCSV('vendor-ledger.csv',vendorLedgerRows())">Export Vendors</button>`,`<div class="grid stats">${stat("Customer Receivable",currency(sum(customers,"balance")),"after credits","AR")}${stat("Vendor Payable",currency(sum(vendors,"balance")),"after debits","AP")}${stat("Credit Notes",currency(sum((S.notes||[]).filter(n=>n.type==="Credit Note"),"amount")),"customers","CN")}${stat("Debit Notes",currency(sum((S.notes||[]).filter(n=>n.type==="Debit Note"),"amount")),"vendors","DN")}</div><div class="grid two" style="margin-top:12px"><div><h3>Customer Ledger</h3>${table(["Customer","Contact","Invoiced","Paid","Credit Notes","Balance"],customers.map(c=>`<tr><td><b>${c.company}</b></td><td>${c.contact}</td><td>${currency(c.invoiced)}</td><td>${currency(c.paid)}</td><td>${currency(c.credit)}</td><td><b>${currency(c.balance)}</b></td></tr>`).join(""))}</div><div><h3>Vendor Ledger</h3>${table(["Vendor","Contact","Purchase","Processed","Debit Notes","Balance"],vendors.map(v=>`<tr><td><b>${v.name}</b></td><td>${v.contact}</td><td>${currency(v.purchase)}</td><td>${currency(v.processed)}</td><td>${currency(v.debit)}</td><td><b>${currency(v.balance)}</b></td></tr>`).join(""))}</div></div>`)}
    function pageIndiaCompliance(){const gst=S.indiaSop.filter(x=>x.area==="GST"),tds=S.indiaSop.filter(x=>x.area==="Income Tax / TDS"),acct=S.indiaSop.filter(x=>x.area==="Ind AS / Accounting"),audit=S.indiaSop.filter(x=>x.area==="Audit");const calendar=[["GSTR-1","Outward supplies, debit/credit notes, e-invoice data","Monthly/Quarterly as applicable"],["GSTR-3B","Summary liability, ITC, RCM, cash/credit ledger offset","Monthly/Quarterly as applicable"],["TDS Deposit","Tax deducted at source challan deposit","Monthly; March has special due-date rules"],["TDS Return","Quarterly TDS/TCS statement and correction review","Quarterly"],["Books Close","Trial balance, ledgers, accruals, provisions, reconciliations","Monthly"],["Ind AS Review","Presentation, estimates, disclosures, revenue, inventory, financial instruments","Quarterly / Year-end"]];return layout("India Accounts & Tax Compliance","Indian accounting, GST, TDS, and audit SOP controls",`<button class="btn" onclick="exportCSV('india-compliance-sop.csv',S.indiaSop)">Export SOP</button><button class="btn primary" onclick="window.print()">Print / PDF</button>`,`<div class="grid stats">${stat("Accounting Controls",acct.length,"Ind AS aligned","AS")}${stat("GST Controls",gst.length,"GSTR/e-invoice","GST")}${stat("TDS Controls",tds.length,"deduct/deposit/file","TDS")}${stat("Reconciliation",audit.length,"ledger controls","REC")}</div><div class="card pad notice" style="margin-top:12px"><h3>Compliance Note</h3><p>This is an ERP SOP and control checklist for Indian operations. Final statutory rates, thresholds, applicability, and filing dates must be verified by the company tax advisor/CA before filing.</p></div><div style="margin-top:12px">${table(["Area","Control","Basis","Frequency","Owner","Status"],S.indiaSop.map(s=>`<tr><td><b>${s.area}</b></td><td>${s.control}</td><td>${s.basis}</td><td>${s.frequency}</td><td>${s.owner}</td><td>${status(s.status)}</td></tr>`).join(""))}</div><div class="grid two" style="margin-top:12px"><div><h3>Compliance Calendar</h3>${table(["Return / Activity","Scope","Frequency"],calendar.map(c=>`<tr><td><b>${c[0]}</b></td><td>${c[1]}</td><td>${c[2]}</td></tr>`).join(""))}</div><div><h3>Monthly Close SOP</h3><div class="card pad"><p>1. Freeze posting period after review.</p><p>2. Reconcile bank, customer, vendor, inventory, GST and TDS ledgers.</p><p>3. Review accruals, provisions, prepaid expenses and depreciation.</p><p>4. Validate G/L mapping, cost centers and material valuation.</p><p>5. Prepare MIS, trial balance and exception report.</p><p>6. Controller approval before statutory filing.</p></div></div></div>`)}

    function parseLedgerCSV(text){const lines=text.replace(/\r/g,"").split("\n").filter(x=>x.trim());if(!lines.length)return[];const split=line=>{const out=[];let cur="",q=false;for(const ch of line){if(ch==='"'){q=!q;continue}if(ch===","&&!q){out.push(cur.trim());cur="";continue}cur+=ch}out.push(cur.trim());return out};const heads=split(lines[0]).map(h=>h.toLowerCase().replace(/[^a-z0-9]+/g,""));return lines.slice(1).map(line=>{const cols=split(line),r={};heads.forEach((h,i)=>r[h]=cols[i]||"");const debit=Number(String(r.debit||r.dr||"0").replace(/[^0-9.-]/g,""))||0,credit=Number(String(r.credit||r.cr||"0").replace(/[^0-9.-]/g,""))||0,amount=Number(String(r.amount||"").replace(/[^0-9.-]/g,""))||credit-debit;return{date:r.date||r.transactiondate||r.postingdate||"",party:r.vendor||r.party||r.name||"",reference:r.reference||r.ref||r.document||r.docno||r.invoice||r.bill||"",description:r.description||r.narration||r.particulars||"",debit,credit,amount,source:"Upload"}}).filter(r=>r.reference||r.description||r.amount)}
    function parseLedgerText(text,fileName="upload"){const csv=parseLedgerCSV(text);if(csv.length)return{rows:csv,note:"Structured rows parsed from "+fileName};const clean=text.replace(/[^\x20-\x7E\n\r\t.,:/-]/g," ").replace(/\s+/g," ");const refs=[...clean.matchAll(/\b(?:INV|PO|BILL|DN|CN|GRN|REF)[-\/ ]?\d{2,}[-\/\w]*/gi)].map(x=>x[0]);const amounts=[...clean.matchAll(/(?:INR|Rs\.?)?\s?[-+]?\d[\d,]*(?:\.\d{1,2})?/gi)].map(x=>Number(x[0].replace(/[^0-9.-]/g,""))).filter(Boolean);const rows=refs.slice(0,Math.max(refs.length,amounts.length)).map((ref,i)=>({date:"",party:"",reference:ref||("AUTO-"+(i+1)),description:"Extracted from "+fileName,debit:0,credit:amounts[i]||0,amount:amounts[i]||0,source:fileName}));return{rows,note:rows.length?"AI text extraction used for "+fileName:"File accepted, but structured ledger rows were not readable. Report will be generated with manual review note."}}
    function parseLedgerFile(file,done){const ext=(file.name.split(".").pop()||"").toLowerCase(),reader=new FileReader();reader.onload=()=>{try{let result;if(["csv","txt","tsv"].includes(ext))result=parseLedgerText(String(reader.result),file.name);else{const bytes=new Uint8Array(reader.result),text=new TextDecoder("latin1").decode(bytes);result=parseLedgerText(text,file.name);if(!result.rows.length&&["xls","xlsx","pdf"].includes(ext))result.note="AI accepted "+file.name+". Browser-only extraction could not read structured rows, so reconciliation will complete with manual review required."}done(result.rows,result.note)}catch(e){done([],"AI accepted "+file.name+", but extraction needs manual review. Reconciliation can still run.")}};if(["csv","txt","tsv"].includes(ext))reader.readAsText(file);else reader.readAsArrayBuffer(file)}
    function uploadReconLedger(kind,file){if(!file)return;parseLedgerFile(file,(rows,note)=>{S.recon=S.recon||{};S.recon[kind]=rows;S.recon.notes=S.recon.notes||[];S.recon.notes.unshift({time:new Date().toISOString(),file:file.name,kind,note});logAction("Uploaded "+kind.replace("Ledger"," ledger")+" file "+file.name,"AI Agent");save();renderMessages();toast(file.name+" uploaded: "+rows.length+" rows")})}
    function autoLinkCompanyLedger(){S.recon=S.recon||{};S.recon.companyLedger=companyVendorLedgerTransactions();logAction("AI auto-linked company vendor ledger","AI Agent");save();renderMessages();toast("Company ledger auto-linked")}
    function reconcileLedgers(){S.recon=S.recon||{};const vendor=S.recon.vendorLedger||[],company=(S.recon.companyLedger&&S.recon.companyLedger.length)?S.recon.companyLedger:companyVendorLedgerTransactions();const used=new Set(),matched=[],amountMismatch=[],missingInCompany=[];vendor.forEach(v=>{const vRef=String(v.reference||"").toLowerCase(),vAmt=Math.abs(Number(v.amount)||Number(v.credit)-Number(v.debit));let idx=company.findIndex((c,i)=>!used.has(i)&&vRef&&String(c.reference||"").toLowerCase()===vRef);if(idx<0)idx=company.findIndex((c,i)=>!used.has(i)&&Math.abs(Math.abs(Number(c.amount))-vAmt)<=1);if(idx>=0){used.add(idx);const c=company[idx],cAmt=Math.abs(Number(c.amount)||Number(c.credit)-Number(c.debit)),diff=vAmt-cAmt;(Math.abs(diff)<=1?matched:amountMismatch).push({vendor:v,company:c,diff})}else missingInCompany.push(v)});const missingInVendor=company.filter((_,i)=>!used.has(i));const vendorTotal=vendor.reduce((a,b)=>a+Math.abs(Number(b.amount)||Number(b.credit)-Number(b.debit)),0),companyTotal=company.reduce((a,b)=>a+Math.abs(Number(b.amount)||Number(b.credit)-Number(b.debit)),0);const reviewNotes=[...(S.recon.notes||[]).map(n=>n.note)];if(!vendor.length)reviewNotes.unshift("Vendor ledger file accepted, but no structured vendor rows were extracted. Manual review required.");S.recon.lastReport={time:new Date().toISOString(),vendorRows:vendor.length,companyRows:company.length,vendorTotal,companyTotal,matched,amountMismatch,missingInCompany,missingInVendor,reviewNotes};logAction("AI completed vendor ledger reconciliation","AI Agent");save();renderReconReport()}
    function renderReconReport(){const r=S.recon?.lastReport;if(!r){toast("No reconciliation report yet");return}const notes=(r.reviewNotes||[]).filter(Boolean).map(n=>`<p class="muted mini">• ${n}</p>`).join("");const html=`<div class="grid stats">${stat("Vendor Rows",r.vendorRows,"uploaded","VL")}${stat("Company Rows",r.companyRows,"linked","CL")}${stat("Matched",r.matched.length,"ok","✓")}${stat("Exceptions",r.amountMismatch.length+r.missingInCompany.length+r.missingInVendor.length,"review","!")}</div><div class="card pad" style="margin-top:12px"><h3>Review Summary</h3><p>Vendor total: <b>${currency(r.vendorTotal)}</b></p><p>Company total: <b>${currency(r.companyTotal)}</b></p><p>Difference: <b>${currency(r.vendorTotal-r.companyTotal)}</b></p><p class="muted mini">Generated: ${new Date(r.time).toLocaleString()}</p>${notes?`<hr style="border:0;border-top:1px solid var(--line);margin:10px 0">${notes}`:""}</div><div style="margin-top:12px">${table(["Exception","Vendor Ref","Company Ref","Amount / Diff"],[...r.amountMismatch.map(x=>`<tr><td>Amount mismatch</td><td>${x.vendor.reference}</td><td>${x.company.reference}</td><td>${currency(x.diff)}</td></tr>`),...r.missingInCompany.map(x=>`<tr><td>Missing in company</td><td>${x.reference}</td><td>-</td><td>${currency(Math.abs(x.amount))}</td></tr>`),...r.missingInVendor.map(x=>`<tr><td>Missing in vendor</td><td>-</td><td>${x.reference}</td><td>${currency(Math.abs(x.amount))}</td></tr>`)].join("")||`<tr><td colspan="4">No exceptions found.</td></tr>`)}</div>`;openModal("Vendor Ledger Reconciliation Report",`<div class="formfoot" style="margin-top:0;margin-bottom:12px"><button class="btn" onclick="exportReconReport()">Download Report</button><button class="btn primary" onclick="window.print()">Print / PDF</button></div>${html}`)}
    function exportReconReport(){const r=S.recon?.lastReport;if(!r)return;const rows=[{section:"Summary",item:"Vendor Rows",value:r.vendorRows},{section:"Summary",item:"Company Rows",value:r.companyRows},{section:"Summary",item:"Vendor Total",value:r.vendorTotal},{section:"Summary",item:"Company Total",value:r.companyTotal},{section:"Summary",item:"Difference",value:r.vendorTotal-r.companyTotal},...r.amountMismatch.map(x=>({section:"Amount Mismatch",item:x.vendor.reference,value:x.diff})),...r.missingInCompany.map(x=>({section:"Missing In Company",item:x.reference,value:x.amount})),...r.missingInVendor.map(x=>({section:"Missing In Vendor",item:x.reference,value:x.amount}))];exportCSV("vendor-ledger-reconciliation-report.csv",rows)}
    function openReconWorkflow(){S.recon=S.recon||{vendorLedger:[],companyLedger:[],lastReport:null};openModal("AI Vendor Ledger Reconciliation",`<div class="recon-panel"><p><b>Step 1:</b> Upload vendor ledger. CSV, Excel, PDF, TXT accepted.</p><label class="btn primary">Upload Vendor Ledger<input type="file" accept=".csv,.txt,.tsv,.pdf,.xls,.xlsx,text/csv,application/pdf,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" hidden onchange="uploadReconLedger('vendorLedger',this.files[0])"></label><p><b>Step 2:</b> Upload company ledger or auto-link from NexERP vendor ledger.</p><label class="btn">Upload Company Ledger<input type="file" accept=".csv,.txt,.tsv,.pdf,.xls,.xlsx,text/csv,application/pdf,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" hidden onchange="uploadReconLedger('companyLedger',this.files[0])"></label><button class="btn" onclick="autoLinkCompanyLedger()">Auto-Link Company Ledger</button><p><b>Step 3:</b> Run AI reconciliation and generate review summary.</p><button class="btn primary" onclick="reconcileLedgers()">Run Reconciliation</button></div><p class="muted mini" style="margin-top:10px">Best results: CSV/Excel exported as CSV. PDF/Excel files are accepted and processed with browser text extraction; if structured rows are not readable, the report still completes with a manual review note.</p>`)}

    function renderMessages(){if(!S.messages)S.messages=[{role:"ai",text:"Namaste. Main workflow bhi chala sakta hun. Neeche quick actions try karo ya type karo: vendor reconciliation, master data, create invoice."}];document.getElementById("messages").innerHTML=S.messages.map(m=>`<div class="msg ${m.role==="user"?"user":""}">${m.text}</div>`).join("")+`<div class="ai-actions"><button class="btn primary" onclick="runAIWorkflow('vendor reconciliation')">Vendor Recon</button><button class="btn" onclick="runAIWorkflow('master data')">Masters</button><button class="btn" onclick="runAIWorkflow('create customer')">Customer</button><button class="btn" onclick="runAIWorkflow('create material')">Material</button><button class="btn" onclick="runAIWorkflow('gl accounts')">G/L</button></div>`;document.getElementById("messages").scrollTop=document.getElementById("messages").scrollHeight}
    function askAI(){const input=document.getElementById("ask"),q=input.value.trim();if(!q)return;S.messages.push({role:"user",text:q});input.value="";const ans=runAIWorkflow(q,true);S.messages.push({role:"ai",text:ans});save();renderMessages()}
    function runAIWorkflow(q,fromChat=false){const l=q.toLowerCase();let ans="Main revenue, stock, HR, sales, purchase, production, ads, ecommerce aur admin workflows handle kar sakta hun.";
      if(/recon|reconcile|reconciliation|vendor ledger upload|vendor ledger/.test(l)){openReconWorkflow();logAction("AI opened vendor ledger reconciliation workflow","AI Agent");ans="Vendor ledger reconciliation workflow khol diya. Vendor CSV upload karo; company ledger upload karo ya auto-link use karo; phir Run Reconciliation dabao."}
      else if(/master/.test(l)){navigate("masters","Customers");ans="Master Data module khol diya. Yahan customer, vendor, COA, G/L, material aur material group masters number-wise manage hote hain."}
      else if(/create|new|add/.test(l)&&/customer/.test(l)){navigate("masters","Customers");openModal("Create Customer Master",form("customer"));ans="Customer master form khol diya. Customer number auto-generate hoga."}
      else if(/create|new|add/.test(l)&&/vendor/.test(l)){navigate("masters","Vendors");openModal("Create Vendor Master",form("vendor"));ans="Vendor master form khol diya. Vendor number auto-generate hoga."}
      else if(/create|new|add/.test(l)&&/material/.test(l)){navigate("masters","Materials");openModal("Create Material Master",form("material"));ans="Material master form khol diya. Material number auto-generate hoga."}
      else if(/g\/l|gl account|ledger account/.test(l)){navigate("masters","G/L Accounts");ans="G/L Accounts master khol diya. G/L accounts number-wise available hain."}
      else if(/chart of accounts|coa/.test(l)){navigate("masters","Chart of Accounts");ans="Chart of Accounts khol diya."}
      else if(/india compliance|indian tax|gst|tds|ind as|accounting sop|tax sop/.test(l)){navigate("finance","India Compliance");ans="India Accounts & Tax Compliance SOP khol diya. Isme Ind AS-style accounting controls, GST controls, TDS controls, calendar aur monthly close checklist hai."}
      else if(/create|new|add/.test(l)&&/invoice|bill/.test(l)){openModal("New Invoice",form("invoice"));logAction("AI opened invoice workflow","AI Agent");ans="Invoice creation workflow khol diya. Details fill karke Save dabao."}
      else if(/credit note|debit note|note/.test(l)){navigate("finance","Debit/Credit Notes");openModal("Create Debit / Credit Note",form("note"));logAction("AI opened debit credit note workflow","AI Agent");ans="Debit/Credit Note workflow khol diya."}
      else if(/ledger|khata|party/.test(l)){navigate("finance","Ledgers");logAction("AI opened ledgers","AI Agent");ans="Customer aur vendor ledger screen khol diya."}
      else if(/add|new|create/.test(l)&&/employee|staff|user/.test(l)){openModal("Add Employee",form("employee"));logAction("AI opened employee workflow","AI Agent");ans="Employee onboarding form khol diya."}
      else if(/create|new|add/.test(l)&&/(po|purchase)/.test(l)){openModal("Create PO",form("po"));logAction("AI opened purchase order workflow","AI Agent");ans="Purchase order workflow khol diya."}
      else if(/movement|material|grn|goods receipt|goods issue|stock transfer/.test(l)){navigate("inventory","Movements");if(/create|new|add|grn|issue|transfer/.test(l))openModal("New Material Movement",form("movement"));logAction("AI opened material movement workflow","AI Agent");ans="Material movement SOP workflow khol diya. Yahan GRN, GI, transfer, RTV, production issue/receipt, adjustment aur scrap manage hote hain."}
      else if(/low stock|stock|inventory|maal/.test(l)){navigate("inventory","Stock");const low=S.stock.filter(p=>p.qty<=p.min);ans=`Inventory screen khol diya. ${low.length} low stock items hain: ${low.map(p=>p.name).join(", ")||"none"}.`}
      else if(/approve/.test(l)&&/(po|purchase)/.test(l)){const po=S.purchase.find(p=>p.status==="pending");if(po){po.status="approved";logAction("AI approved "+po.id,"AI Agent");save();render();ans=`${po.id} approve kar diya.`}else ans="Koi pending PO nahi mila."}
      else if(/backup|download/.test(l)){backupData();ans="Backup download start kar diya."}
      else if(/commercial|audit|admin/.test(l)){navigate("settings","Commercial");ans="Commercial/admin screen khol diya jahan backup, restore, reset aur audit log hai."}
      else if(/revenue|income|kamai/.test(l))ans=`Total invoiced revenue ${currency(sum(S.invoices,"amount"))} hai. Paid revenue ${currency(sum(S.invoices.filter(i=>i.status==="paid"),"amount"))} hai.`
      else if(/hr|employee|staff/.test(l))ans=`Total ${S.employees.length} employees hain. Monthly payroll ${currency(sum(S.employees,"salary"))} hai.`
      else if(/sales|deal|pipeline/.test(l))ans=`Open pipeline value ${currency(sum(S.deals.filter(d=>d.stage!=="closed won"),"value"))} hai.`
      else if(/purchase|po|vendor/.test(l))ans=`${S.purchase.filter(p=>p.status==="pending").length} purchase orders approval ke liye pending hain.`
      if(!fromChat){S.messages=S.messages||[];S.messages.push({role:"user",text:q},{role:"ai",text:ans});save();renderMessages()}
      return ans
    }
    function globalSearch(q){if(q.length<2)return;const all=[...S.invoices.map(x=>["finance","Invoices",x.id+" "+x.client]),...S.stock.map(x=>["inventory","Stock",x.sku+" "+x.name]),...S.employees.map(x=>["hr","Employees",x.name+" "+x.department])];const hit=all.find(x=>x[2].toLowerCase().includes(q.toLowerCase()));if(hit){navigate(hit[0],hit[1]);toast("Found: "+hit[2])}}
    render();
  </script>
</body>
</html>
